<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Token Usage</title>
  <link rel="icon" type="image/png" href="stats/assets/icon.png" />
  <link rel="stylesheet" href="stats/assets/tailwind.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
  <script type="module" src="stats/assets/app.js"></script>
</head>

<body x-data="dashboard" class="dashboard-page min-h-screen bg-[#fbfbfc] text-[#2f2433] antialiased">
  <main class="mx-auto max-w-378 px-4 py-4 sm:px-6 lg:px-7">
    <header class="mb-5 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <div class="flex items-center">
        <h1 class="app-heading text-[2rem] font-black leading-none tracking-normal text-[#251a2d] sm:text-[2.45rem]">
          Token Usage
        </h1>
      </div>
      <div class="flex flex-col gap-2 sm:flex-row sm:items-center">
        <p id="meta" x-text="meta" class="app-muted text-sm font-medium text-slate-500">Loading...</p>
        <button id="refreshBtn" type="button" x-on:click="loadOverview()" x-bind:disabled="loading"
          class="soft-button inline-flex h-10 items-center justify-center gap-2 rounded-lg border border-rose-100 bg-rose-50 px-4 text-sm font-extrabold text-rose-600 transition hover:bg-rose-100 disabled:cursor-not-allowed disabled:opacity-70">
          <span>Refresh</span>
          <svg viewBox="0 0 24 24" aria-hidden="true" class="size-4">
            <path fill="currentColor"
              d="M17.7 6.3A8 8 0 0 0 4 12h2a6 6 0 0 1 10.3-4.2L13 11h8V3l-3.3 3.3ZM6.3 17.7A8 8 0 0 0 20 12h-2a6 6 0 0 1-10.3 4.2L11 13H3v8l3.3-3.3Z" />
          </svg>
        </button>
      </div>
    </header>

    <section id="periodCards" class="mb-5 grid grid-cols-1 gap-3 sm:grid-cols-2 xl:grid-cols-4">
      <template x-for="card in periodCards()" x-bind:key="card.label">
        <article class="min-h-29 rounded-xl p-3.5" x-bind:class="periodCardClass(card)">
          <div class="text-xs font-extrabold" x-bind:class="periodMutedClass(card)" x-text="card.label"></div>
          <div class="mt-1.5 text-2xl font-black leading-none tracking-normal tabular-nums sm:text-[1.65rem]"
            x-text="fmt(card.total)"></div>
          <div class="mt-3 grid grid-cols-2 gap-2.5 border-t pt-2.5" x-bind:class="periodLineClass(card)">
            <div>
              <div class="text-xs font-semibold" x-bind:class="periodMutedClass(card)">Input</div>
              <div class="mt-1 text-base font-black tabular-nums" x-text="fmt(card.input)"></div>
              <div class="mt-1 text-xs font-semibold tabular-nums" x-bind:class="periodMutedClass(card)">
                Cached <span x-text="fmt(card.cached)"></span>
              </div>
            </div>
            <div>
              <div class="text-xs font-semibold" x-bind:class="periodMutedClass(card)">Output</div>
              <div class="mt-1 text-base font-black tabular-nums" x-text="fmt(card.output)"></div>
              <div class="mt-1 text-xs font-semibold tabular-nums" x-bind:class="periodMutedClass(card)">
                Reasoning <span x-text="fmt(card.reasoning)"></span>
              </div>
            </div>
          </div>
        </article>
      </template>
    </section>

    <section class="mb-5 grid grid-cols-1 gap-3 xl:grid-cols-[3fr_2fr]">
      <article
        class="surface-card rounded-xl border border-slate-200 bg-white p-4 shadow-[0_12px_38px_rgba(15,23,42,0.045)]">
        <div class="mb-3 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <h2 class="app-heading text-lg font-black tracking-normal text-[#251a2d]">Usage Trend</h2>
          <div id="trendTabs" class="flex items-center gap-2">
            <template x-for="days in trendOptions" x-bind:key="days">
              <button type="button" x-on:click="setTrendDays(days)"
                class="rounded-md px-3 py-1.5 text-[13px] font-extrabold transition" x-bind:class="trendTabClass(days)">
                <span x-text="days"></span> Days
              </button>
            </template>
          </div>
        </div>
        <div class="relative h-68 min-h-68 w-full">
          <canvas id="trendChart"></canvas>
        </div>
      </article>

      <article
        class="surface-card rounded-xl border border-slate-200 bg-white p-4 shadow-[0_12px_38px_rgba(15,23,42,0.045)]">
        <div class="mb-3 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <h2 id="compositionHeading" class="app-heading text-lg font-black tracking-normal text-[#251a2d]">
            Token Composition
          </h2>
          <label
            class="control-surface flex h-9 w-full items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 text-xs font-extrabold text-slate-600 shadow-sm sm:w-auto">
            <span class="sr-only">Composition window</span>
            <select id="compositionSelect" x-model="compositionWindow"
              class="app-text w-full bg-transparent text-[#251a2d] outline-none sm:w-auto">
              <template x-for="window in compositionWindows()" x-bind:key="window.key">
                <option x-bind:value="window.key" x-text="window.label"></option>
              </template>
            </select>
          </label>
        </div>
        <div class="grid gap-3 lg:grid-cols-[minmax(160px,0.75fr)_1fr] lg:items-center">
          <div class="relative mx-auto h-62 w-full max-w-62">
            <canvas id="compositionChart"></canvas>
            <div id="compositionCenter"
              class="app-text pointer-events-none absolute inset-0 grid place-items-center text-center text-[#251a2d]">
              <div>
                <div class="text-sm font-extrabold">Total</div>
                <div class="mt-1 text-lg font-black tabular-nums" x-text="fmt(compositionTotal())"></div>
              </div>
            </div>
          </div>
          <div id="compositionLegend" class="grid gap-3.5">
            <template x-for="row in compositionRows()" x-bind:key="row.label">
              <div class="grid grid-cols-[12px_1fr] gap-2.5">
                <span class="mt-1.5 size-2.5 rounded-full" x-bind:style="'background:' + row.color"></span>
                <div>
                  <div class="app-text text-[13px] font-extrabold text-[#251a2d]" x-text="row.label"></div>
                  <div class="app-text mt-0.5 text-sm font-black tabular-nums text-[#251a2d]">
                    <span x-text="fmt(row.data.tokens)"></span>
                    <span class="app-muted font-semibold text-slate-500">(<span
                        x-text="fmtPercent(row.data.percent)"></span>)</span>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>
      </article>
    </section>

    <section>
      <div class="mb-4 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
        <h2 id="accountHeading" class="app-heading text-2xl font-black tracking-normal text-[#251a2d]"
          x-text="'Accounts (' + filteredAccounts().length + ')'">Accounts</h2>
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
          <label
            class="control-surface flex h-11 w-full items-center gap-2 rounded-lg border border-slate-200 bg-white px-4 text-sm font-semibold text-slate-600 shadow-sm sm:w-auto">
            <span class="whitespace-nowrap">Sort by:</span>
            <select id="sortSelect" x-model="sort" class="app-text min-w-0 flex-1 bg-transparent text-[#251a2d] outline-none sm:min-w-32 sm:flex-none">
              <option value="total">Total Usage</option>
              <option value="input">Input</option>
              <option value="output">Output</option>
              <option value="cached">Cached</option>
            </select>
          </label>
          <label class="relative block h-11 min-w-0 sm:w-70">
            <svg viewBox="0 0 24 24" aria-hidden="true"
              class="app-subtle pointer-events-none absolute left-4 top-1/2 size-4 -translate-y-1/2 text-slate-400">
              <path fill="currentColor"
                d="m20.3 18.9-4.2-4.2a7 7 0 1 0-1.4 1.4l4.2 4.2 1.4-1.4ZM5 10.5a5.5 5.5 0 1 1 11 0 5.5 5.5 0 0 1-11 0Z" />
            </svg>
            <input id="searchInput" x-model="search" type="search" placeholder="Search account"
              class="app-input h-full w-full rounded-lg border border-slate-200 bg-white pl-11 pr-4 text-sm font-semibold text-[#251a2d] shadow-sm outline-none transition placeholder:text-slate-400 focus:border-rose-300 focus:ring-4 focus:ring-rose-100" />
          </label>
        </div>
      </div>

      <div id="accountCards" class="grid grid-cols-1 gap-3 md:grid-cols-2 xl:grid-cols-4">
        <template x-for="(account, index) in filteredAccounts()" x-bind:key="account.account_key">
          <article
            class="surface-card rounded-xl border border-slate-200 bg-white p-3.5 text-[#251a2d] shadow-[0_10px_34px_rgba(15,23,42,0.045)]">
            <div class="flex min-w-0 items-center gap-2.5 sm:gap-3">
              <template x-if="planFor(account, index).icon">
                <img class="size-9 shrink-0 object-contain sm:size-10" x-bind:src="planFor(account, index).icon"
                  x-bind:alt="planFor(account, index).label + ' plan icon'" loading="lazy">
              </template>
              <template x-if="!planFor(account, index).icon">
                <div class="grid size-9 shrink-0 place-items-center rounded-lg text-base font-black sm:size-10"
                  x-bind:style="planIconStyle(account, index)" x-text="accountInitial(account)"></div>
              </template>
              <div class="flex min-w-0 flex-1 items-center gap-1.5">
                <div class="app-text min-w-0 truncate text-sm font-black tracking-normal"
                  x-bind:title="displayAccountName(account)" x-text="displayAccountName(account)"></div>
                <span class="app-muted shrink-0 text-sm font-black leading-none">&#183;</span>
                <span
                  class="inline-flex h-5 shrink-0 items-center rounded-md px-1.5 text-[10px] font-black uppercase leading-none"
                  x-bind:style="planBadgeStyle(account, index)"
                  x-text="String(planFor(account, index).label || 'unknown').toUpperCase()"></span>
              </div>
            </div>

            <div class="mt-4 grid grid-cols-3 gap-2 rounded-lg border p-2"
              x-bind:style="accountSummaryStyle(account, index)">
              <div>
                <div class="app-muted text-[11px] font-extrabold leading-tight text-slate-500">Total Usage</div>
                <div class="mt-1 text-sm font-black leading-none tracking-normal tabular-nums"
                  x-bind:style="accountMetricStyle(account, index, colors.text)" x-text="fmt(account.total_tokens)">
                </div>
              </div>
              <div>
                <div class="app-muted text-[11px] font-extrabold leading-tight text-slate-500">Input</div>
                <div class="mt-1 text-sm font-black leading-none tracking-normal tabular-nums"
                  x-bind:style="accountMetricStyle(account, index)" x-text="fmt(totalInput(account))"></div>
                <div class="app-subtle mt-1 truncate text-[11px] font-bold leading-none text-slate-400 tabular-nums">
                  Cached <span x-text="fmt(account.cached_tokens)"></span>
                </div>
              </div>
              <div class="text-right">
                <div class="app-muted text-[11px] font-extrabold leading-tight text-slate-500">Output</div>
                <div class="mt-1 text-sm font-black leading-none tracking-normal tabular-nums"
                  x-bind:style="accountMetricStyle(account, index, colors.text)" x-text="fmt(account.output_tokens)">
                </div>
              </div>
            </div>

            <div class="mt-4 grid gap-3">
              <template x-for="quotaWindow in [quota(account, '5h'), quota(account, 'weekly')]"
                x-bind:key="quotaWindow.label">
                <div class="grid gap-1.5">
                  <div class="app-muted flex items-center justify-between gap-2 text-xs font-extrabold text-slate-500">
                    <span x-text="quotaWindow.label"></span>
                    <span class="app-text text-[#251a2d] tabular-nums" x-text="quotaPercentText(quotaWindow)"></span>
                  </div>
                  <div class="h-1.5 overflow-hidden rounded-full" x-bind:style="quotaTrackStyle(account, index)">
                    <span class="block h-full rounded-full"
                      x-bind:style="quotaFillStyle(account, index, quotaWindow)"></span>
                  </div>
                  <div
                    class="app-muted flex items-center justify-between gap-2 text-[11px] font-bold leading-tight text-slate-500">
                    <span class="tabular-nums" x-text="quotaDetail(quotaWindow)"></span>
                    <span x-text="quotaResetText(quotaWindow)"></span>
                  </div>
                </div>
              </template>
            </div>

            <div class="mt-3.5">
              <div class="subtle-border grid grid-cols-3 gap-2 border-t border-slate-100 pt-3 text-center">
                <template x-for="row in compositionBreakdownRows(account)" x-bind:key="row.label">
                  <div>
                    <div class="text-sm font-black tabular-nums" x-bind:style="'color:' + row.color"
                      x-text="fmtPercent(row.percent)"></div>
                    <div class="app-muted mt-1 text-[11px] font-extrabold text-slate-500" x-text="row.label"></div>
                  </div>
                </template>
              </div>
            </div>
          </article>
        </template>
      </div>
      <div id="accountsEmpty" x-bind:class="{ hidden: filteredAccounts().length !== 0 }"
        class="surface-card app-muted hidden rounded-2xl border border-slate-200 bg-white px-6 py-10 text-center text-sm font-semibold text-slate-500 shadow-[0_18px_60px_rgba(15,23,42,0.06)]">
        No accounts.
      </div>
      <footer class="app-muted mt-4 px-2 text-center text-xs font-semibold text-slate-500">
        <span>Usage data refreshes every 5 minutes</span>
        <span class="app-subtle mx-3 text-slate-300">|</span>
        <span>Cached: Tokens served from cache</span>
      </footer>
    </section>
  </main>
</body>

</html>
