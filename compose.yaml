services:
  codex-load-balancer:
    image: damonto/codex-load-balancer:latest
    restart: unless-stopped
    ports:
      - "${CLB_PORT:-8080}:${CLB_LISTEN_PORT:-8080}"
    volumes:
      - ./data:${CLB_DATA_DIR:-/app/data}
    environment:
      CLB_API_KEY: ${CLB_API_KEY:?CLB_API_KEY is required}
      CLB_DATA_DIR: ${CLB_DATA_DIR:-/app/data}
      CLB_LISTEN_PORT: ${CLB_LISTEN_PORT:-8080}
      CLB_SYNC_INTERVAL: ${CLB_SYNC_INTERVAL:-5m}
      CLB_SYNC_CONCURRENCY: ${CLB_SYNC_CONCURRENCY:-8}
