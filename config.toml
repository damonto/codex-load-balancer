api_key = "your-api-key"
data_dir = "data"

[server]
port = 8080

[top_up]
min_valid_accounts = 10
register_workers = 5
register_timeout_seconds = 360

[sync]
usage_sync_interval_seconds = 300
usage_sync_concurrency = 8

[account]
registration_proxy_pool = [
  "http://REDACTED_PROXY",
  "http://REDACTED_PROXY",
]
